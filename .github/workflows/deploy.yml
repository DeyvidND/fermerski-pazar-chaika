name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/deyvidnd/fermerski-pazar-chaika

jobs:
  build:
    name: Build storefront
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha,scope=pazar
          cache-to: type=gha,mode=max,scope=pazar
          build-args: |
            PUBLIC_API_BASE=${{ vars.PAZAR_API_BASE }}
            PUBLIC_TENANT_SLUG=${{ vars.PAZAR_TENANT_SLUG }}
            PUBLIC_ADMIN_URL=${{ vars.PAZAR_ADMIN_URL }}
            PUBLIC_GOOGLE_MAPS_KEY=${{ vars.PAZAR_GOOGLE_MAPS_KEY }}

  deploy:
    name: Trigger Dokploy Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [build]
    steps:
      - name: Trigger storefront deploy
        run: |
          if [ -n "${{ secrets.DOKPLOY_PAZAR_WEBHOOK }}" ]; then
            curl -fsSL -X POST "${{ secrets.DOKPLOY_PAZAR_WEBHOOK }}" -H "Content-Type: application/json"
          else echo "DOKPLOY_PAZAR_WEBHOOK not set — skipping"; fi
