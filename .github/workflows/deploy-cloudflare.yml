name: Deploy to Cloudflare Pages

# The storefront's deploy path: build the Astro Cloudflare-adapter output and
# ship it to Cloudflare Pages. Replaces the old GHCR-image + Dokploy webhook.
#
# Required in repo settings:
#   secrets:  CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID
#   vars:     PAZAR_API_BASE, PAZAR_TENANT_SLUG, PAZAR_ADMIN_URL, PAZAR_GOOGLE_MAPS_KEY
# Plus a Cloudflare Pages project named "fermerski-pazar-chaika".
#
# NOTE: fires on `main` — set the secrets + Pages project BEFORE merging this
# branch to main, or main pushes will fail the deploy step.
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Build + deploy to Pages
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Build (PUBLIC_* inlined at build time)
        env:
          PUBLIC_API_BASE: ${{ vars.PAZAR_API_BASE }}
          PUBLIC_TENANT_SLUG: ${{ vars.PAZAR_TENANT_SLUG }}
          PUBLIC_ADMIN_URL: ${{ vars.PAZAR_ADMIN_URL }}
          PUBLIC_GOOGLE_MAPS_KEY: ${{ vars.PAZAR_GOOGLE_MAPS_KEY }}
        run: npm run build

      - name: Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy ./dist --project-name=fermerski-pazar-chaika
