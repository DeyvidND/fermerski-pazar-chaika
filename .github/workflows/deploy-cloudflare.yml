name: Deploy to Cloudflare Pages (WIP)

# Parallel deploy path to Cloudflare Pages, kept OFF the production trigger.
# Runs only on manual dispatch or pushes to the migration branch, so the live
# GHCR + Dokploy path (deploy.yml on main) is untouched until cutover.
#
# Required once in the repo settings before this can actually deploy:
#   secrets:  CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID
#   vars:     PAZAR_API_BASE, PAZAR_TENANT_SLUG, PAZAR_ADMIN_URL, PAZAR_GOOGLE_MAPS_KEY
# Plus a Cloudflare Pages project named "fermerski-pazar-chaika".
on:
  workflow_dispatch:
  push:
    branches: [feat/cloudflare-pages]

jobs:
  deploy:
    name: Build + deploy to Pages
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Build (PUBLIC_* inlined at build time)
        env:
          PUBLIC_API_BASE: ${{ vars.PAZAR_API_BASE }}
          PUBLIC_TENANT_SLUG: ${{ vars.PAZAR_TENANT_SLUG }}
          PUBLIC_ADMIN_URL: ${{ vars.PAZAR_ADMIN_URL }}
          PUBLIC_GOOGLE_MAPS_KEY: ${{ vars.PAZAR_GOOGLE_MAPS_KEY }}
        run: npm run build

      - name: Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy ./dist --project-name=fermerski-pazar-chaika
