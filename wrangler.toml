# Cloudflare Workers config for the chaika storefront (Astro SSR via
# @astrojs/cloudflare). Deployed through Cloudflare Workers Builds (Git
# integration): CF runs `npm run build` then `wrangler deploy`.
#
# `astro build` emits the SSR worker at ./dist/_worker.js/index.js and the static
# client assets in ./dist; the [assets] binding serves the static files and falls
# through to the worker for SSR routes.
#
# nodejs_compat lets the small Node-style reads resolve on Workers (see
# checkout.astro's globalThis.process?.env fallback). Build-time PUBLIC_* are
# inlined by Vite at `astro build` — set them as BUILD variables in the Worker
# (Settings → Build), not just runtime bindings. See CLOUDFLARE.md.
name = "fermerski-pazar-chaika"
main = "./dist/_worker.js/index.js"
compatibility_date = "2026-06-01"
compatibility_flags = ["nodejs_compat"]

[assets]
binding = "ASSETS"
directory = "./dist"
